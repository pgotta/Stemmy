name: Package Stemmy source snapshot

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Upload complete source tree
        uses: actions/upload-artifact@v4
        with:
          name: stemmy-complete-source
          path: |
            .
            !.git/**
          include-hidden-files: true
          retention-days: 1
